name: Ultra-Low Size AV1 Encode
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Source Video'
        required: true
      output_name:
        description: 'Output Filename (without extension)'
        default: 'encoded_video'
        required: true

jobs:
  encode-video:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"
          # This gives us ~30-35GB of working room

      - name: Install FFmpeg
        uses: Apptainer/setup-ffmpeg@v1
        with:
          ffmpeg-version: '6.1'

      - name: Download and Encode
        # We process the file and then immediately delete the source to free space
        run: |
          curl -L "${{ github.event.inputs.video_url }}" -o source_file.mkv
          
          ffmpeg -y -i source_file.mkv \
            -map 0 \
            -vf "hqdn3d=1.5:1.2:3:3,scale=-1:1080" \
            -c:v libsvtav1 \
            -pix_fmt yuv420p10le \
            -preset 8 \
            -crf 55 \
            -svtav1-params "tune=0:film-grain=0:enable-tpl-la=1:enable-overlays=1" \
            -c:a libopus -b:a 48k -vbr on \
            -c:s copy \
            -map_chapters 0 \
            "${{ github.event.inputs.output_name }}.mkv"
          
          rm source_file.mkv

      - name: Upload Final Encoded Video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          # Path points specifically to your new file
          path: "${{ github.event.inputs.output_name }}.mkv"
          if-no-files-found: error
          retention-days: 3
