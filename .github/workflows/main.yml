name: Ultra-Low Size AV1 Encode
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Source Video (Supports brackets [])'
        required: true
      output_name:
        description: 'Output Filename (Do NOT include .mkv)'
        default: 'encoded_video'
        required: true
      start_time:
        description: 'Start Time (HH:MM:SS)'
        default: '00:00:00'
        required: false
      duration:
        description: 'Duration (HH:MM:SS) - Set to 0 for full video'
        default: '0'
        required: false

jobs:
  encode-video:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download and Encode
        run: |
          # 1. Download using -g to ignore globbing (fixing the bracket error)
          curl -g -L "${{ github.event.inputs.video_url }}" -o source_file.mkv
          
          # 2. Logic for partial encoding
          DURATION_FLAG=""
          if [ "${{ github.event.inputs.duration }}" != "0" ]; then
            DURATION_FLAG="-t ${{ github.event.inputs.duration }}"
          fi

          # 3. Encode with your Quality-Fix parameters
          # Using "" around the output name to handle spaces in the shell
          ffmpeg -y -ss ${{ github.event.inputs.start_time }} $DURATION_FLAG \
            -i source_file.mkv \
            -map 0 \
            -vf "hqdn3d=1.5:1.2:3:3,scale=-1:1080" \
            -c:v libsvtav1 \
            -pix_fmt yuv420p10le \
            -preset 6 \
            -crf 55 \
            -svtav1-params "tune=0:film-grain=0:enable-tpl-la=1:enable-overlays=1:aq-mode=1" \
            -c:a libopus -b:a 32k -vbr on \
            -c:s copy \
            -map_chapters 0 \
            "${{ github.event.inputs.output_name }}.mkv"
          
          # 4. CRITICAL: Remove source so the wildcard upload ONLY finds the result
          rm source_file.mkv

      - name: Upload Final Encoded Video
        uses: actions/upload-artifact@v4
        with:
          name: "Encoded-Output-File"
          # Using the wildcard ./ *.mkv solves the "File Not Found" bracket error
          path: "./*.mkv"
          if-no-files-found: error
          retention-days: 3
