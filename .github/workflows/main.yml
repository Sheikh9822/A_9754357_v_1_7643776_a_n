name: Ultra-Low Size Av1an Encode
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Source Video'
        required: true
      output_name:
        description: 'Output Filename (No .mkv)'
        default: 'encoded_video'
        required: true
      start_time:
        description: 'Start Time (HH:MM:SS)'
        default: '00:00:00'
        required: false
      duration:
        description: 'Duration (HH:MM:SS) - 0 for full'
        default: '0'
        required: false

jobs:
  av1an-encode:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"

      - name: Download Source
        run: curl -g -L "${{ github.event.inputs.video_url }}" -o source_file.mkv

      - name: Run Av1an
        run: |
          # Define the duration limit if provided
          LIMIT=""
          if [ "${{ github.event.inputs.duration }}" != "0" ]; then
            LIMIT="--seek ${{ github.event.inputs.start_time }} --length ${{ github.event.inputs.duration }}"
          fi

          # Using Docker to run Av1an with all dependencies pre-installed
          docker run --rm -v $(pwd):/files masterofzen/av1an:latest \
            -i /files/source_file.mkv \
            $LIMIT \
            --verbose \
            --encoder svt-av1 \
            --video-params " --preset 6 --crf 55 --tune 0 --enable-tpl-la 1 --aq-mode 1 --enable-overlays 1 " \
            --audio-params "-c:a libopus -b:a 32k" \
            --split-method pyscene \
            -o "/files/${{ github.event.inputs.output_name }}.mkv"

      - name: Cleanup Source
        run: rm source_file.mkv

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: "Av1an-Output"
          path: "./*.mkv"
          if-no-files-found: error