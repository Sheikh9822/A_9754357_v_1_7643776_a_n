name: Ultra-Low Size AV1 Encode
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Source Video'
        required: true
      output_name:
        description: 'Output Filename (without extension)'
        default: 'encoded_video'
        required: true

jobs:
  encode-video:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download and Encode
        run: |
          # Use -g to handle brackets in workers.dev URLs
          curl -g -L "${{ github.event.inputs.video_url }}" -o source_file.mkv
          
          # Ultra-low size optimized command
          # -map_metadata -1 strips hidden bloat
          # aq-mode=0 and enable-tpl-la=0 force the lowest possible bitrate
          ffmpeg -y -i source_file.mkv \
            -map 0 -map_metadata -1 \
            -vf "hqdn3d=1.5:1.2:3:3,scale=-1:1080" \
            -c:v libsvtav1 \
            -pix_fmt yuv420p10le \
            -preset 6 \
            -crf 55 \
            -svtav1-params "tune=0:film-grain=0:enable-tpl-la=0:enable-overlays=0:aq-mode=0" \
            -c:a libopus -b:a 32k -vbr on \
            -c:s copy \
            -map_chapters 0 \
            "${{ github.event.inputs.output_name }}.mkv"
          
          rm source_file.mkv

      - name: Upload Final Encoded Video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          path: "${{ github.event.inputs.output_name }}.mkv"
          if-no-files-found: error
          retention-days: 3
