# =============================================================================
# Ultra-Low Size AV1 Encode — av1an Docker Edition
# Runner: ubuntu-latest (4 vCPU / 16 GB RAM / 14 GB SSD, x64)
#
# Uses the official masterofzen/av1an Docker image — zero dependency setup.
# The image ships av1an + SVT-AV1 + VapourSynth + L-SMASH Works pre-built.
# av1an scene-detects and encodes all chunks in parallel across all 4 vCPUs.
#
# Runner specs (free & unlimited on public repositories)
# ┌─────────────┬──────┬───────────┬──────────┬──────────────────────────────┐
# │ OS          │ vCPU │ RAM       │ Storage  │ Workflow label               │
# ├─────────────┼──────┼───────────┼──────────┼──────────────────────────────┤
# │ Linux       │  4   │ 16 GB     │ 14 GB    │ ubuntu-latest / ubuntu-24.04 │
# └─────────────┴──────┴───────────┴──────────┴──────────────────────────────┘
# =============================================================================

name: Ultra-Low Size AV1 Encode (av1an)

on:
  workflow_dispatch:
    inputs:

      # ── Source ──────────────────────────────────────────────────────────────
      video_url:
        description: 'Direct link to source video (brackets [] are safe)'
        required: true

      output_name:
        description: 'Output filename — do NOT include .mkv'
        default: 'encoded_video'
        required: true

      # ── Trim ────────────────────────────────────────────────────────────────
      start_time:
        description: 'Start time HH:MM:SS  (default = beginning)'
        default: '00:00:00'
        required: false

      duration:
        description: 'Duration  HH:MM:SS  (0 = full video)'
        default: '0'
        required: false

      # ── Quality ─────────────────────────────────────────────────────────────
      crf:
        description: 'CRF / quality  (SVT-AV1 range 0-63, lower = better)'
        default: '55'
        required: false

      preset:
        description: 'SVT-AV1 preset  (0 slowest -> 13 fastest)'
        default: '6'
        required: false

      # ── av1an parallelism ───────────────────────────────────────────────────
      workers:
        description: 'Parallel chunk workers  (0 = auto-detect from vCPU count)'
        default: '0'
        required: false

      chunk_method:
        description: 'Chunk / demux method  (ffms2 | hybrid | select | segment)'
        default: 'ffms2'
        required: false

      # ── Scene detection ─────────────────────────────────────────────────────
      sc_method:
        description: 'Scene-change detection method  (standard | fast | none)'
        default: 'standard'
        required: false

      min_scene_len:
        description: 'Minimum scene length in frames (avoids tiny chunks)'
        default: '24'
        required: false

      # ── Audio ───────────────────────────────────────────────────────────────
      audio_bitrate:
        description: 'Opus audio bitrate (e.g. 32k, 64k, 96k)'
        default: '32k'
        required: false

      # ── Grain synthesis ─────────────────────────────────────────────────────
      photon_noise:
        description: 'Photon-noise / film-grain synthesis ISO (0 = disabled)'
        default: '0'
        required: false

jobs:
  encode-video:
    name: 'av1an encode -> ${{ github.event.inputs.output_name }}.mkv'
    runs-on: ubuntu-latest   # 4 vCPU · 16 GB RAM · 14 GB SSD (x64)

    steps:

      # ── 1. Install host-side tools (ffmpeg for trim + ffprobe for verify) ───
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg mkvtoolnix

      # ── 3. Pull av1an Docker image ───────────────────────────────────────────
      # masterofzen/av1an:latest bundles av1an + SVT-AV1 + VapourSynth +
      # L-SMASH Works — no manual dependency installs needed.
      - name: Pull av1an Docker Image
        run: docker pull masterofzen/av1an:latest

      # ── 4. Download source video ─────────────────────────────────────────────
      - name: Download Source Video
        run: |
          # -g disables glob expansion so brackets in URLs pass through safely
          curl -g -L --retry 3 --retry-delay 5 \
            "${{ github.event.inputs.video_url }}" \
            -o source_raw.mkv

          echo "=== Source file info ==="
          ls -lh source_raw.mkv
          ffprobe -v quiet -show_format -show_streams source_raw.mkv 2>&1 | head -50

      # ── 5. Trim source (optional) ────────────────────────────────────────────
      - name: Trim Source
        run: |
          START="${{ github.event.inputs.start_time }}"
          DURATION="${{ github.event.inputs.duration }}"

          if [ "$START" = "00:00:00" ] && [ "$DURATION" = "0" ]; then
            echo "No trimming requested — using full source."
            mv source_raw.mkv source.mkv
          else
            echo "Trimming: start=$START  duration=$DURATION"
            DURATION_FLAG=""
            [ "$DURATION" != "0" ] && DURATION_FLAG="-t $DURATION"

            # Stream-copy trim; avoids a full re-encode at this stage
            ffmpeg -y \
              -ss "$START" $DURATION_FLAG \
              -i source_raw.mkv \
              -map 0 \
              -c copy \
              source.mkv

            rm source_raw.mkv
            ls -lh source.mkv
          fi

      # ── 6. Encode with av1an via Docker ──────────────────────────────────────
      - name: Encode with av1an (Docker, SVT-AV1, chunked parallel)
        run: |
          CRF="${{ github.event.inputs.crf }}"
          PRESET="${{ github.event.inputs.preset }}"
          WORKERS="${{ github.event.inputs.workers }}"
          SC_METHOD="${{ github.event.inputs.sc_method }}"
          MIN_SCENE="${{ github.event.inputs.min_scene_len }}"
          PHOTON="${{ github.event.inputs.photon_noise }}"
          AUDIO_BR="${{ github.event.inputs.audio_bitrate }}"
          OUTPUT="${{ github.event.inputs.output_name }}.mkv"

          # Worker auto-detect: ubuntu-latest = 4 vCPU
          # Reserve 1 for Docker/I/O orchestration, hand the rest to av1an
          if [ "$WORKERS" = "0" ]; then
            VCPUS=$(nproc)
            WORKERS=$(( VCPUS > 1 ? VCPUS - 1 : 1 ))
            echo "Auto-detected ${VCPUS} vCPUs → using ${WORKERS} parallel workers"
          fi

          # Optional photon-noise flag
          PHOTON_FLAG=""
          [ "$PHOTON" != "0" ] && PHOTON_FLAG="--photon-noise ${PHOTON}"

          echo "============================================"
          echo "  Image      : masterofzen/av1an:latest"
          echo "  Encoder    : SVT-AV1"
          echo "  CRF        : $CRF"
          echo "  Preset     : $PRESET"
          echo "  Workers    : $WORKERS"
          echo "  Chunk      : ${{ github.event.inputs.chunk_method }}"
          echo "  SC method  : $SC_METHOD"
          echo "  Min scene  : $MIN_SCENE frames"
          echo "  Audio br   : $AUDIO_BR"
          echo "  Photon     : ${PHOTON_FLAG:-disabled}"
          echo "  Output     : $OUTPUT"
          echo "============================================"

          # Mount $PWD as /videos inside the container.
          # --user preserves file ownership so the runner can read the output.
          # --privileged is required by av1an for mkvmerge concat.
          docker run --rm --privileged \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/videos" \
            masterofzen/av1an:latest \
              -i /videos/source.mkv \
              -o "/videos/${OUTPUT}" \
              --encoder svt-av1 \
              --workers "$WORKERS" \
              --chunk-method "${{ github.event.inputs.chunk_method }}" \
              --sc-method "$SC_METHOD" \
              --min-scene-len "$MIN_SCENE" \
              --extra-split 240 \
              --concat mkvmerge \
              --pix-format yuv420p10le \
              --resume \
              --verbose \
              $PHOTON_FLAG \
              --ffmpeg "-vf hqdn3d=1.5:1.2:3:3,scale=-1:1080" \
              --video-params "--preset ${PRESET} --crf ${CRF} --tune 0 --film-grain 0 --enable-tpl-la 1 --enable-overlays 1 --aq-mode 1" \
              --audio-params "-c:a libopus -b:a ${AUDIO_BR} -vbr on"

          echo "=== Encode complete ==="
          ls -lh "$OUTPUT"

      # ── 7. Verify output & print encode report ───────────────────────────────
      - name: Verify Output & Print Encode Report
        run: |
          OUTPUT="${{ github.event.inputs.output_name }}.mkv"

          if [ ! -f "$OUTPUT" ]; then
            echo "::error::Encoded file '$OUTPUT' not found!"
            exit 1
          fi

          SOURCE_BYTES=$(stat -c%s source.mkv 2>/dev/null || echo 0)
          OUTPUT_BYTES=$(stat -c%s "$OUTPUT")
          RATIO=$(python3 -c "
          s, o = $SOURCE_BYTES, $OUTPUT_BYTES
          print(f'{o/s*100:.1f}%' if s else 'N/A')
          ")

          echo "============================================"
          echo "  Source  : $(numfmt --to=iec $SOURCE_BYTES)"
          echo "  Output  : $(numfmt --to=iec $OUTPUT_BYTES)"
          echo "  Ratio   : $RATIO of original"
          echo "============================================"
          ffprobe -v quiet \
            -show_streams -show_format \
            -of default=noprint_wrappers=1 \
            "$OUTPUT" 2>&1 | \
            grep -E 'codec_name|width|height|r_frame_rate|bit_rate|duration|size|channel'

      # ── 8. Upload artifact ───────────────────────────────────────────────────
      - name: Upload Encoded Video
        uses: actions/upload-artifact@v4
        with:
          name: 'Encoded-Output-File'
          # Wildcard avoids bracket/special-char expansion issues in the path
          path: './*.mkv'
          if-no-files-found: error
          retention-days: 3
