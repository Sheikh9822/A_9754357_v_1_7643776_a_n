# =============================================================================
# Ultra-Low Size AV1 Encode — av1an Edition
# Runner: ubuntu-latest (4 vCPU / 16 GB RAM / 14 GB SSD, x64)
#
# av1an splits the source into scene-detected chunks and encodes them in
# parallel, then concatenates the result — dramatically faster than a single
# FFmpeg pass while preserving the same SVT-AV1 quality target.
#
# Required runner specs used by this workflow
# ┌─────────────┬──────┬───────────┬──────────┬──────────────────────────────┐
# │ OS          │ vCPU │ RAM       │ Storage  │ Workflow label               │
# ├─────────────┼──────┼───────────┼──────────┼──────────────────────────────┤
# │ Linux       │  4   │ 16 GB     │ 14 GB    │ ubuntu-latest / ubuntu-24.04 │
# └─────────────┴──────┴───────────┴──────────┴──────────────────────────────┘
# Free and unlimited for public repositories.
# =============================================================================

name: Ultra-Low Size AV1 Encode (av1an)

on:
  workflow_dispatch:
    inputs:

      # ── Source ──────────────────────────────────────────────────────────────
      video_url:
        description: 'Direct link to source video (brackets [] are safe)'
        required: true

      output_name:
        description: 'Output filename — do NOT include .mkv'
        default: 'encoded_video'
        required: true

      # ── Trim ────────────────────────────────────────────────────────────────
      start_time:
        description: 'Start time HH:MM:SS  (default = beginning)'
        default: '00:00:00'
        required: false

      duration:
        description: 'Duration  HH:MM:SS  (0 = full video)'
        default: '0'
        required: false

      # ── Quality ─────────────────────────────────────────────────────────────
      crf:
        description: 'CRF / quality  (SVT-AV1 range 0-63, lower = better)'
        default: '55'
        required: false

      preset:
        description: 'SVT-AV1 preset  (0 slowest -> 13 fastest)'
        default: '6'
        required: false

      # ── av1an parallelism ───────────────────────────────────────────────────
      workers:
        description: 'Parallel chunk workers  (0 = auto-detect from vCPU count)'
        default: '0'
        required: false

      chunk_method:
        description: 'Chunk / demux method  (lsmash | ffms2 | hybrid | select | segment)'
        default: 'lsmash'
        required: false

      # ── Scene detection ─────────────────────────────────────────────────────
      sc_method:
        description: 'Scene-change detection method  (standard | fast | none)'
        default: 'standard'
        required: false

      min_scene_len:
        description: 'Minimum scene length in frames (avoid tiny chunks)'
        default: '24'
        required: false

      # ── Audio ───────────────────────────────────────────────────────────────
      audio_bitrate:
        description: 'Opus audio bitrate (e.g. 32k, 64k, 96k)'
        default: '32k'
        required: false

      # ── Grain synthesis ─────────────────────────────────────────────────────
      photon_noise:
        description: 'Photon-noise / film-grain synthesis ISO (0 = disabled)'
        default: '0'
        required: false

jobs:
  encode-video:
    name: 'av1an encode -> ${{ github.event.inputs.output_name }}.mkv'
    runs-on: ubuntu-latest   # 4 vCPU · 16 GB RAM · 14 GB SSD (x64), free for public repos

    steps:

      # ── 1. Free up disk space ────────────────────────────────────────────────
      - name: Maximize Disk Space
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/local/lib/android \
            "$AGENT_TOOLSDIRECTORY"
          echo "=== Disk after cleanup ==="
          df -h

      # ── 2. Install system dependencies ──────────────────────────────────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            mkvtoolnix \
            python3 \
            curl \
            wget \
            git \
            unzip

      # ── 3. Install av1an binary ──────────────────────────────────────────────
      - name: Install av1an
        run: |
          # Resolve latest pre-built static binary (Linux x86_64) from
          # the official rust-av/Av1an GitHub releases page.
          AV1AN_RELEASE_URL=$(
            curl -fsSL https://api.github.com/repos/rust-av/Av1an/releases/latest \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data['assets']:
              name = a['name']
              if 'x86_64' in name and ('Linux' in name or 'linux' in name):
                  print(a['browser_download_url'])
                  break
          "
          )

          if [ -z "$AV1AN_RELEASE_URL" ]; then
            echo "::warning::Could not resolve latest release URL; trying known path"
            AV1AN_RELEASE_URL="https://github.com/rust-av/Av1an/releases/latest/download/av1an-x86_64-Linux"
          fi

          echo "Downloading av1an from: $AV1AN_RELEASE_URL"

          if echo "$AV1AN_RELEASE_URL" | grep -q '\.tar\.gz'; then
            curl -fsSL "$AV1AN_RELEASE_URL" -o /tmp/av1an.tar.gz
            tar -xzf /tmp/av1an.tar.gz -C /tmp
            AV1AN_BIN=$(find /tmp -name "av1an" -type f 2>/dev/null | head -1)
          else
            curl -fsSL "$AV1AN_RELEASE_URL" -o /tmp/av1an
            AV1AN_BIN=/tmp/av1an
          fi

          sudo install -m 755 "$AV1AN_BIN" /usr/local/bin/av1an

          echo "=== av1an version ==="
          av1an --version

      # ── 4. Install SVT-AV1 encoder binary ───────────────────────────────────
      - name: Install SVT-AV1
        run: |
          # Try latest release binary first
          SVT_URL=$(
            curl -fsSL https://api.github.com/repos/AOMediaCodec/SVT-AV1/releases/latest \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data['assets']:
              n = a['name'].lower()
              if 'linux' in n and n.endswith('.tar.gz'):
                  print(a['browser_download_url'])
                  break
          " 2>/dev/null || echo ""
          )

          if [ -n "$SVT_URL" ]; then
            curl -fsSL "$SVT_URL" -o /tmp/svtav1.tar.gz
            tar -xzf /tmp/svtav1.tar.gz -C /tmp
            SVT_BIN=$(find /tmp -name "SvtAv1EncApp" -type f 2>/dev/null | head -1)
            [ -n "$SVT_BIN" ] && sudo install -m 755 "$SVT_BIN" /usr/local/bin/SvtAv1EncApp && \
              echo "Installed SVT-AV1 from upstream release" && SvtAv1EncApp --version && exit 0
          fi

          # Fallback: apt package (may be an older version)
          echo "Falling back to apt svt-av1..."
          sudo apt-get install -y svt-av1 || true
          SvtAv1EncApp --version || true

      # ── 5. Install L-SMASH Works VapourSynth plugin (enables lsmash chunks) ─
      - name: Install VapourSynth + L-SMASH Works
        run: |
          # Install VapourSynth from pip (static wheel, no compile needed)
          pip3 install vapoursynth --break-system-packages 2>/dev/null || \
          pip3 install vapoursynth 2>/dev/null || \
          sudo apt-get install -y vapoursynth 2>/dev/null || true

          VS_PLUGIN_DIR=$(python3 -c "
          try:
              import vapoursynth as vs
              print(vs.get_plugins_ro())
          except Exception:
              print('/usr/lib/vapoursynth')
          " 2>/dev/null)

          sudo mkdir -p "$VS_PLUGIN_DIR"

          # Download L-SMASH Works pre-built plugin
          LSMASH_URL="https://github.com/AkarinVS/L-SMASH-Works/releases/download/vA.3j/LSMASHWorks-x86_64-Linux-GNU.tar.gz"
          if curl -fsSL "$LSMASH_URL" -o /tmp/lsmash.tar.gz 2>/dev/null; then
            tar -xzf /tmp/lsmash.tar.gz -C /tmp/lsmash_out 2>/dev/null || mkdir -p /tmp/lsmash_out
            sudo cp /tmp/lsmash_out/*.so "$VS_PLUGIN_DIR/" 2>/dev/null && \
              echo "L-SMASH Works installed to $VS_PLUGIN_DIR" || true
          else
            echo "::warning::L-SMASH Works download failed; chunk method may fall back"
          fi

          # Expose resolved chunk method for the encode step
          CHUNK_INPUT="${{ github.event.inputs.chunk_method }}"
          echo "RESOLVED_CHUNK=${CHUNK_INPUT:-lsmash}" >> "$GITHUB_ENV"

      # ── 6. Download source video ─────────────────────────────────────────────
      - name: Download Source Video
        run: |
          echo "=== Downloading source ==="
          # -g disables glob so brackets in URLs are passed literally
          curl -g -L --retry 3 --retry-delay 5 \
            "${{ github.event.inputs.video_url }}" \
            -o source_raw.mkv

          echo "=== Source file info ==="
          ls -lh source_raw.mkv
          ffprobe -v quiet -show_format -show_streams source_raw.mkv 2>&1 | head -50

      # ── 7. Trim source (if requested) ────────────────────────────────────────
      - name: Trim Source (optional)
        run: |
          START="${{ github.event.inputs.start_time }}"
          DURATION="${{ github.event.inputs.duration }}"

          if [ "$START" = "00:00:00" ] && [ "$DURATION" = "0" ]; then
            echo "No trimming requested — using full source."
            mv source_raw.mkv source.mkv
          else
            echo "Trimming: start=$START  duration=$DURATION"
            DURATION_FLAG=""
            [ "$DURATION" != "0" ] && DURATION_FLAG="-t $DURATION"

            # Stream-copy trim; avoids re-encode at this stage
            ffmpeg -y \
              -ss "$START" $DURATION_FLAG \
              -i source_raw.mkv \
              -map 0 \
              -c copy \
              source.mkv

            rm source_raw.mkv
            echo "=== Trimmed source size ==="
            ls -lh source.mkv
          fi

      # ── 8. av1an parallel encode ─────────────────────────────────────────────
      - name: Encode with av1an (SVT-AV1, chunked parallel)
        run: |
          CRF="${{ github.event.inputs.crf }}"
          PRESET="${{ github.event.inputs.preset }}"
          WORKERS="${{ github.event.inputs.workers }}"
          SC_METHOD="${{ github.event.inputs.sc_method }}"
          MIN_SCENE="${{ github.event.inputs.min_scene_len }}"
          PHOTON="${{ github.event.inputs.photon_noise }}"
          AUDIO_BR="${{ github.event.inputs.audio_bitrate }}"
          OUTPUT="${{ github.event.inputs.output_name }}.mkv"

          # ── Worker auto-detect ───────────────────────────────────────────────
          # ubuntu-latest = 4 vCPU; reserve 1 for I/O, use 3 for encoding chunks
          if [ "$WORKERS" = "0" ]; then
            VCPUS=$(nproc)
            WORKERS=$(( VCPUS > 1 ? VCPUS - 1 : 1 ))
            echo "Auto-detected ${VCPUS} vCPUs → using ${WORKERS} parallel workers"
          fi

          # ── Optional photon-noise flag ───────────────────────────────────────
          PHOTON_FLAG=""
          [ "$PHOTON" != "0" ] && PHOTON_FLAG="--photon-noise ${PHOTON}"

          # ── Chunk method (may have been updated by VapourSynth install step) ─
          CHUNK="${RESOLVED_CHUNK:-lsmash}"

          echo "============================================"
          echo "  Encoder    : SVT-AV1"
          echo "  CRF        : $CRF"
          echo "  Preset     : $PRESET"
          echo "  Workers    : $WORKERS"
          echo "  Chunk      : $CHUNK"
          echo "  SC method  : $SC_METHOD"
          echo "  Min scene  : $MIN_SCENE frames"
          echo "  Audio br   : $AUDIO_BR"
          echo "  Photon     : ${PHOTON_FLAG:-disabled}"
          echo "  Output     : $OUTPUT"
          echo "============================================"

          av1an \
            -i source.mkv \
            -o "$OUTPUT" \
            \
            --encoder svt-av1 \
            --workers "$WORKERS" \
            --chunk-method "$CHUNK" \
            --sc-method "$SC_METHOD" \
            --min-scene-len "$MIN_SCENE" \
            --extra-split 240 \
            --concat mkvmerge \
            --pix-format yuv420p10le \
            --resume \
            --verbose \
            $PHOTON_FLAG \
            \
            --ffmpeg "-vf hqdn3d=1.5:1.2:3:3,scale=-1:1080" \
            \
            --video-params \
              "--preset ${PRESET} --crf ${CRF} --tune 0 --film-grain 0 --enable-tpl-la 1 --enable-overlays 1 --aq-mode 1" \
            \
            --audio-params \
              "-c:a libopus -b:a ${AUDIO_BR} -vbr on"

          echo "=== Encode complete ==="
          ls -lh "$OUTPUT"

      # ── 9. Stats & verification ──────────────────────────────────────────────
      - name: Verify Output & Print Encode Report
        run: |
          OUTPUT="${{ github.event.inputs.output_name }}.mkv"

          if [ ! -f "$OUTPUT" ]; then
            echo "::error::Encoded file '$OUTPUT' not found!"
            exit 1
          fi

          SOURCE_BYTES=$(stat -c%s source.mkv 2>/dev/null || echo 0)
          OUTPUT_BYTES=$(stat -c%s "$OUTPUT")

          RATIO=$(python3 -c "
          s, o = $SOURCE_BYTES, $OUTPUT_BYTES
          print(f'{o/s*100:.1f}%' if s else 'N/A')
          ")

          SOURCE_HUMAN=$(numfmt --to=iec $SOURCE_BYTES  2>/dev/null || echo "${SOURCE_BYTES} bytes")
          OUTPUT_HUMAN=$(numfmt --to=iec $OUTPUT_BYTES  2>/dev/null || echo "${OUTPUT_BYTES} bytes")

          echo "============================================"
          echo "  Source size  : $SOURCE_HUMAN"
          echo "  Output size  : $OUTPUT_HUMAN"
          echo "  Compression  : $RATIO of original"
          echo "============================================"

          echo "=== Stream info ==="
          ffprobe -v quiet \
            -show_streams -show_format \
            -of default=noprint_wrappers=1 \
            "$OUTPUT" 2>&1 | \
            grep -E 'codec_name|width|height|r_frame_rate|bit_rate|duration|size|channel'

      # ── 10. Upload artifact ──────────────────────────────────────────────────
      - name: Upload Encoded Video
        uses: actions/upload-artifact@v4
        with:
          name: 'Encoded-Output-File'
          # Wildcard path avoids bracket/special-char expansion issues
          path: './*.mkv'
          if-no-files-found: error
          retention-days: 3
