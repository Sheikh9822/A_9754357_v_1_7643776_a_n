name: Ultra-Low Size AV1an Encode
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Source Video'
        required: true
      output_name:
        description: 'Output Filename (no .mkv)'
        default: 'av1an_encoded'
        required: true
      crf:
        description: 'Quality (CRF) - Higher is smaller size'
        default: '55'
        required: true

jobs:
  encode-video:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"
          sudo apt-get clean

      - name: Install Dependencies (FFmpeg & SVT-AV1)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsvtav1-dev mkvtoolnix

      - name: Install Av1an Binary
        run: |
          # Downloading the latest static binary from the official repo
          curl -L https://github.com/master-of-zen/Av1an/releases/download/0.4.1/av1an-0.4.1-linux-x86_64 -o av1an
          chmod +x av1an
          sudo mv av1an /usr/local/bin/

      - name: Download Source
        run: |
          curl -g -L "${{ github.event.inputs.video_url }}" -o source_file.mkv

      - name: Encode with Av1an
        run: |
          # Using 4 workers (-w 4) to utilize the GitHub runner's 4 CPUs
          av1an -i source_file.mkv \
            -v " --preset 6 --crf ${{ github.event.inputs.crf }} --svtav1-params tune=0:film-grain=0:enable-tpl-la=1:enable-overlays=1:aq-mode=1 " \
            -e svt-av1 \
            --video-params " -vf hqdn3d=1.5:1.2:3:3,scale=-1:1080 " \
            -a " -c:a libopus -b:a 32k -vbr on " \
            -w 4 \
            --pix-format yuv420p10le \
            -o "${{ github.event.inputs.output_name }}.mkv"

      - name: Upload Final Encoded Video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          path: "./${{ github.event.inputs.output_name }}.mkv"
          retention-days: 3
