name: Ultra-Low Size AV1an Encode
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Source Video'
        required: true
      output_name:
        description: 'Output Filename'
        default: 'av1an_encoded'
        required: true
      crf:
        description: 'Quality (CRF) - Higher is smaller'
        default: '55'
        required: true

jobs:
  encode-video:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"
          sudo apt-get clean

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Av1an requires ffmpeg for splitting and mkvtoolnix for merging
          sudo apt-get install -y ffmpeg mkvtoolnix libsvtav1-dev

      - name: Download Av1an from Repo Releases
        run: |
          # Fetching the specific x86_64-unknown-linux-musl binary from the 0.4.1 release
          # This is the static binary that doesn't require extra libraries
          curl -L https://github.com/rust-av/Av1an/releases/download/0.4.1/av1an-0.4.1-x86_64-unknown-linux-musl -o av1an
          chmod +x av1an
          sudo mv av1an /usr/local/bin/av1an
          av1an --version

      - name: Download Source
        run: |
          curl -g -L "${{ github.event.inputs.video_url }}" -o source_file.mkv

      - name: Encode with Av1an
        run: |
          # Per the repo docs:
          # -i: input, -y: overwrite
          # -e: encoder (svt-av1)
          # -v: encoder params (passed to SVT-AV1)
          # -w: workers (4 for GitHub Hosted Runners)
          # --split-method: 'ffmpeg' is safest for minimal installs
          
          av1an -i source_file.mkv \
            -y \
            -e svt-av1 \
            -v " --preset 6 --crf ${{ github.event.inputs.crf }} --svtav1-params tune=0:film-grain=0:enable-tpl-la=1:enable-overlays=1:aq-mode=1 " \
            --video-params " -vf hqdn3d=1.5:1.2:3:3,scale=-1:1080 " \
            -a " -c:a libopus -b:a 32k -vbr on " \
            -w 4 \
            --split-method ffmpeg \
            --pix-format yuv420p10le \
            -o "${{ github.event.inputs.output_name }}.mkv"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          path: "./${{ github.event.inputs.output_name }}.mkv"
