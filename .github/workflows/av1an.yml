name: Ultra-Low Size AV1an Encode
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Source Video'
        required: true
      output_name:
        description: 'Output Filename'
        default: 'av1an_encoded'
        required: true
      crf:
        description: 'Quality (CRF) - 55+ for ultra-low size'
        default: '55'
        required: true

jobs:
  encode-video:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"
          sudo apt-get clean

      - name: Install Dependencies (Wiki Recommended)
        run: |
          sudo apt-get update
          # Av1an requires mkvtoolnix for the 'merge' phase and ffmpeg for 'split'
          sudo apt-get install -y ffmpeg mkvtoolnix libsvtav1-dev

      - name: Download Av1an via GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The wiki points to the rust-av/Av1an repo. 
          # We pull the latest Linux binary specifically.
          gh release download --repo rust-av/Av1an --pattern "*linux-x86_64*" --output av1an
          chmod +x av1an
          sudo mv av1an /usr/local/bin/av1an
          av1an --version

      - name: Download Source
        run: |
          curl -g -L "${{ github.event.inputs.video_url }}" -o source_file.mkv

      - name: Encode with Av1an (Scene-Based Parallelism)
        run: |
          # Based on Av1an Wiki 'Best Practices':
          # -w 4: 1 worker per CPU core on ubuntu-latest
          # --pix-format: 10-bit is recommended even for 8-bit source to reduce compression artifacts
          
          av1an -i source_file.mkv \
            -y \
            -e svt-av1 \
            -v " --preset 6 --crf ${{ github.event.inputs.crf }} --svtav1-params tune=0:film-grain=0:enable-tpl-la=1:enable-overlays=1:aq-mode=1 " \
            --video-params " -vf hqdn3d=1.5:1.2:3:3,scale=-1:1080 " \
            -a " -c:a libopus -b:a 32k -vbr on " \
            -w 4 \
            --split-method ffmpeg \
            --pix-format yuv420p10le \
            -o "${{ github.event.inputs.output_name }}.mkv"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          path: "./${{ github.event.inputs.output_name }}.mkv"
          retention-days: 3
