# =============================================================================
# Ultra-Low Size AV1 Encode (Anime Edition) — av1an + libaom-av1
# Runner: ubuntu-latest (4 vCPU / 16 GB RAM / 14 GB SSD, x64)
# Uses the official masterofzen/av1an Docker image.
# Optimized for Anime: 10-bit, SSIM tuning, Grain Synthesis, and Forward KFs.
# =============================================================================

name: Ultra-Low Size AV1 Anime Encode (libaom)

on:
  workflow_dispatch:
    inputs:

      # ── Source ──────────────────────────────────────────────────────────────
      video_url:
        description: 'Direct link to source video (brackets[] are safe)'
        required: true

      output_name:
        description: 'Output filename — do NOT include .mkv'
        default: 'anime_encoded'
        required: true

      # ── Trim ────────────────────────────────────────────────────────────────
      start_time:
        description: 'Start time HH:MM:SS  (default = beginning)'
        default: '00:00:00'
        required: false

      duration:
        description: 'Duration  HH:MM:SS  (0 = full video)'
        default: '0'
        required: false

      # ── Quality (libaom) ────────────────────────────────────────────────────
      crf:
        description: 'CQ Level / Quality (libaom range 0-63, 24-26 recommended)'
        default: '24'
        required: false

      preset:
        description: 'libaom cpu-used speed (0 slowest -> 9 fastest, 4 or 6 recommended)'
        default: '4'
        required: false

      # ── av1an parallelism ───────────────────────────────────────────────────
      workers:
        description: 'Parallel chunk workers (0 = auto-detect 4 workers for libaom)'
        default: '0'
        required: false

      chunk_method:
        description: 'Chunk / demux method (ffms2 | hybrid | select | segment)'
        default: 'ffms2'
        required: false

      # ── Scene detection ─────────────────────────────────────────────────────
      sc_method:
        description: 'Scene-change detection method (standard | fast | none)'
        default: 'standard'
        required: false

      min_scene_len:
        description: 'Minimum scene length in frames (avoids tiny chunks)'
        default: '24'
        required: false

      # ── Audio ───────────────────────────────────────────────────────────────
      audio_bitrate:
        description: 'Opus audio bitrate (e.g. 32k, 64k, 96k)'
        default: '64k'
        required: false

      # ── Grain synthesis ─────────────────────────────────────────────────────
      grain_synth:
        description: 'libaom denoise-noise-level (10 for digital anime, 15+ for cel, 0 = off)'
        default: '10'
        required: false

jobs:
  encode-video:
    name: 'libaom encode -> ${{ github.event.inputs.output_name }}.mkv'
    runs-on: ubuntu-latest   # 4 vCPU · 16 GB RAM · 14 GB SSD (x64)

    steps:

      # ── 1. Install FFmpeg ────────────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg mkvtoolnix

      # ── 2. Cache av1an Docker image ──────────────────────────────────────────
      - name: Cache av1an Docker Image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/av1an-image.tar
          key: docker-masterofzen-av1an-latest-${{ runner.os }}

      - name: Load or Pull av1an Docker Image
        run: |
          if [ -f /tmp/av1an-image.tar ]; then
            echo "Cache hit — loading image from tar..."
            docker load -i /tmp/av1an-image.tar
          else
            echo "Cache miss — pulling from Docker Hub..."
            docker pull masterofzen/av1an:latest
            docker save masterofzen/av1an:latest -o /tmp/av1an-image.tar
          fi

      # ── 3. Cache av1an Temp Folder (For Resuming) ────────────────────────────
      # If the 6-hour GitHub limit kills the runner, re-running the action
      # will restore the chunks that already finished and resume automatically.
      - name: Cache av1an Resume Data
        uses: actions/cache@v4
        with:
          path: av1an-tmp
          key: av1an-resume-${{ github.run_id }}
          restore-keys: |
            av1an-resume-

      # ── 4. Download source video ─────────────────────────────────────────────
      - name: Download Source Video
        run: |
          curl -g -L --retry 3 --retry-delay 5 \
            "${{ github.event.inputs.video_url }}" \
            -o source_raw.mkv

          echo "=== Source file info ==="
          ls -lh source_raw.mkv
          ffprobe -v quiet -show_format -show_streams source_raw.mkv 2>&1 | head -50

      # ── 5. Trim source (optional) ────────────────────────────────────────────
      - name: Trim Source
        run: |
          START="${{ github.event.inputs.start_time }}"
          DURATION="${{ github.event.inputs.duration }}"

          if[ "$START" = "00:00:00" ] && [ "$DURATION" = "0" ]; then
            echo "No trimming requested — using full source."
            mv source_raw.mkv source.mkv
          else
            echo "Trimming: start=$START  duration=$DURATION"
            DURATION_FLAG=""
            [ "$DURATION" != "0" ] && DURATION_FLAG="-t $DURATION"

            ffmpeg -y \
              -ss "$START" $DURATION_FLAG \
              -i source_raw.mkv \
              -map 0 \
              -c copy \
              source.mkv

            rm source_raw.mkv
            ls -lh source.mkv
          fi

      # ── 6. Encode with av1an via Docker (libaom-av1) ─────────────────────────
      - name: Encode with av1an (Docker, libaom-av1, chunked parallel)
        run: |
          CRF="${{ github.event.inputs.crf }}"
          PRESET="${{ github.event.inputs.preset }}"
          WORKERS="${{ github.event.inputs.workers }}"
          SC_METHOD="${{ github.event.inputs.sc_method }}"
          MIN_SCENE="${{ github.event.inputs.min_scene_len }}"
          GRAIN="${{ github.event.inputs.grain_synth }}"
          AUDIO_BR="${{ github.event.inputs.audio_bitrate }}"
          OUTPUT="${{ github.event.inputs.output_name }}.mkv"

          # Worker auto-detect for libaom on 4 vCPUs
          # libaom is single-threaded per chunk, so we want exactly 4 workers.
          if [ "$WORKERS" = "0" ]; then
            WORKERS=4
            echo "Auto-detected libaom on 4 vCPUs → using 4 parallel workers (1 thread each)"
          fi

          # Optional grain synthesis flag
          GRAIN_FLAG=""[ "$GRAIN" != "0" ] && GRAIN_FLAG="--denoise-noise-level=${GRAIN}"

          echo "============================================"
          echo "  Image      : masterofzen/av1an:latest"
          echo "  Encoder    : libaom-av1"
          echo "  CQ Level   : $CRF"
          echo "  CPU-Used   : $PRESET"
          echo "  Workers    : $WORKERS"
          echo "  Chunk      : ${{ github.event.inputs.chunk_method }}"
          echo "  Grain      : ${GRAIN_FLAG:-disabled}"
          echo "  Output     : $OUTPUT"
          echo "============================================"

          mkdir -p "$PWD/av1an-tmp"

          # Run encode in background so we can poll progress.
          # Note: --threads=1 is passed to libaom to prevent core contention.
          docker run --rm --privileged \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/videos" \
            masterofzen/av1an:latest \
              -i /videos/source.mkv \
              -o "/videos/${OUTPUT}" \
              --temp /videos/av1an-tmp \
              --encoder aom \
              --workers "$WORKERS" \
              --chunk-method "${{ github.event.inputs.chunk_method }}" \
              --sc-method "$SC_METHOD" \
              --min-scene-len "$MIN_SCENE" \
              --extra-split 240 \
              --concat mkvmerge \
              --pix-format yuv420p10le \
              --resume \
              --verbose \
              --ffmpeg "-vf hqdn3d=1.5:1.2:3:3,scale=-1:1080" \
              --video-params "--cpu-used=${PRESET} --cq-level=${CRF} --threads=1 --tune=ssim --enable-fwd-kf=1 --kf-max-dist=240 ${GRAIN_FLAG}" \
              --audio-params "-c:a libopus -b:a ${AUDIO_BR} -vbr on" \
            &
          DOCKER_PID=$!

          # Poll av1an's done.json every 30s
          START_TS=$SECONDS
          while kill -0 $DOCKER_PID 2>/dev/null; do
            sleep 30
            DONE=$(python3 -c "
          import json
          try:
              d = json.load(open('$PWD/av1an-tmp/done.json'))
              print(len(d.get('done', {})))
          except Exception:
              print('?')
          " 2>/dev/null || echo "?")
            ELAPSED=$(( SECONDS - START_TS ))
            MINS=$(( ELAPSED / 60 ))
            SECS=$(( ELAPSED % 60 ))
            echo "  [${MINS}m ${SECS}s]  Chunks done: ${DONE}"
          done

          wait $DOCKER_PID

          echo "=== Encode complete ==="
          ls -lh "$OUTPUT"

      # ── 7. Verify output & print encode report ───────────────────────────────
      - name: Verify Output & Print Encode Report
        run: |
          OUTPUT="${{ github.event.inputs.output_name }}.mkv"

          if[ ! -f "$OUTPUT" ]; then
            echo "::error::Encoded file '$OUTPUT' not found! (Did it hit the 6-hour timeout?)"
            exit 1
          fi

          SOURCE_BYTES=$(stat -c%s source.mkv 2>/dev/null || echo 0)
          OUTPUT_BYTES=$(stat -c%s "$OUTPUT")
          RATIO=$(python3 -c "
          s, o = $SOURCE_BYTES, $OUTPUT_BYTES
          print(f'{o/s*100:.1f}%' if s else 'N/A')
          ")

          echo "============================================"
          echo "  Source  : $(numfmt --to=iec $SOURCE_BYTES)"
          echo "  Output  : $(numfmt --to=iec $OUTPUT_BYTES)"
          echo "  Ratio   : $RATIO of original"
          echo "============================================"
          ffprobe -v quiet \
            -show_streams -show_format \
            -of default=noprint_wrappers=1 \
            "$OUTPUT" 2>&1 | \
            grep -E 'codec_name|width|height|r_frame_rate|bit_rate|duration|size|channel'

      # ── 8. Upload artifact ───────────────────────────────────────────────────
      - name: Upload Encoded Video
        uses: actions/upload-artifact@v4
        with:
          name: 'Encoded-Output-File'
          path: '${{ github.event.inputs.output_name }}.mkv'
          if-no-files-found: error
          retention-days: 3